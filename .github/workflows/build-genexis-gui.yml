name: Build Genexis GUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies (根 workspace, 含 tauri-plugin-vpnservice)
        run: pnpm install --frozen-lockfile

      - name: Build tauri-plugin-vpnservice-api (生成 dist-js, 修 vue-tsc TS2307)
        working-directory: tauri-plugin-vpnservice
        run: pnpm build

      - name: Generate Genexis icons (optional)
        working-directory: easytier-gui
        shell: bash
        run: |
          if [ -f "./icons/1024x1024.png" ]; then
            echo "Genexis source icon found, generating platform icons..."
            pnpm exec tauri icon ./icons/1024x1024.png
          else
            echo "No Genexis source icon found, using existing icons."
          fi

      - name: Build Tauri app
        working-directory: easytier-gui
        env:
          CI: true
        run: pnpm exec tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genexis-gui-${{ runner.os }}
          path: |
            easytier-gui/src-tauri/target/release/bundle/**/*.exe
            easytier-gui/src-tauri/target/release/bundle/**/*.msi
            easytier-gui/src-tauri/target/release/bundle/**/*.dmg
            easytier-gui/src-tauri/target/release/bundle/**/*.deb
            easytier-gui/src-tauri/target/release/bundle/**/*.AppImage
            easytier-gui/src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Genexis GUI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
